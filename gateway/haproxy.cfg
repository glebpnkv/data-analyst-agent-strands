# Session-affinity gateway for the data-analyst agent service.
#
# Routes /v1/chat and /v1/sessions/* to one of N agent ECS tasks using
# *consistent hashing* on the X-Session-Id request header. Same
# session_id → same agent task, even when tasks are added or removed
# (only ~1/N sessions move on add/remove instead of all of them).
#
# Backends are discovered dynamically via AWS Cloud Map: the agent
# ECS service registers each task into a private DNS namespace, and
# HAProxy resolves the resulting DNS records on a short TTL. Tasks
# that disappear get ejected automatically; tasks that appear get
# picked up on the next resolve.
#
# Config-time env vars (rendered by the ECS task definition):
#   AGENT_SERVICE_DNS    — e.g. "agent.dataanalyst.local"
#   AGENT_SERVICE_PORT   — e.g. "8080"
#
# Runtime knobs:
#   - hold valid 10s        : how long DNS results stay authoritative
#   - check inter 5s        : how often each backend gets a healthcheck
#   - server-template 1-8   : pre-allocates 8 backend slots so the
#                              pool can scale up to 8 agent tasks
#                              without a config reload.

global
    log stdout format raw local0 info
    maxconn 4096
    # Don't run as a daemon; let ECS see the foreground process.
    # (No `daemon` directive; foreground is the default in containers.)

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    # SSE streams from /v1/chat can run for the full agent turn
    # (model thinking + multiple tool calls). The agent's own httpx
    # timeout is 180s; give the gateway a bit more headroom.
    timeout client  300s
    timeout server  300s
    timeout queue   30s

# ----- DNS discovery for Cloud Map ------------------------------------
resolvers awsdns
    # AWS-provided DNS lives at VPC CIDR base + 2 (e.g. 10.0.0.2).
    # Cloud Map A records resolve through this resolver.
    nameserver dns1 169.254.169.253:53
    accepted_payload_size 8192
    hold valid    10s
    hold timeout  30s
    hold refused  30s
    hold nx       10s
    hold obsolete 30s

# ----- Stats + health listener (private, port 8404) -------------------
frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    monitor-uri /healthz

# ----- Main listener (port 80) ----------------------------------------
frontend agent_in
    bind *:80
    default_backend agent_pool

backend agent_pool
    # Consistent hashing on the X-Session-Id request header. The
    # `consistent` keyword switches from modulo to consistent hashing,
    # which is the one that minimises reshuffling when the backend
    # list changes. Falls back to round-robin for requests with no
    # X-Session-Id header — handy for health checks and any
    # admin-style endpoints that don't carry a session.
    balance hdr(X-Session-Id)
    hash-type consistent

    # Active healthcheck — HAProxy probes /healthz on each backend
    # every 5s, ejects unhealthy tasks within ~15s.
    option httpchk GET /healthz
    http-check expect status 200

    # server-template creates a fixed-size pool of named backend
    # slots (agent-1..agent-8) that get filled from the Cloud Map DNS
    # record. `init-addr none` lets HAProxy start even if DNS is
    # temporarily slow; slots become healthy as resolution completes.
    server-template agent- 8 ${AGENT_SERVICE_DNS}:${AGENT_SERVICE_PORT} resolvers awsdns init-addr none check inter 5s rise 2 fall 3
